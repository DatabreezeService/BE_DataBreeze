spring.application.name=databreeze-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${SERVER_PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.jackson.time-zone=${APP_TIMEZONE:Asia/Ho_Chi_Minh}
spring.jackson.locale=${APP_LOCALE:vi_VN}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:25MB}

# PostgreSQL datasource (local/default)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/databreeze_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT auth
app.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-minutes=${APP_JWT_EXP_MINUTES:120}

# OTP email verification
app.otp.length=${APP_OTP_LENGTH:6}
app.otp.ttl-minutes=${APP_OTP_TTL_MINUTES:15}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:vieyoungboy@gmail.com}
spring.mail.password=${MAIL_PASSWORD:aytvdckkwkuqvgue}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:vieyoungboy@gmail.com}

# Cấu hình mặc định cho thị trường Việt Nam
app.market.country=${APP_MARKET_COUNTRY:VN}
app.market.locale=${APP_MARKET_LOCALE:vi-VN}
app.market.currency=${APP_MARKET_CURRENCY:VND}
app.market.timezone=${APP_TIMEZONE:Asia/Ho_Chi_Minh}
app.default-platform=${APP_DEFAULT_PLATFORM:SHOPEE}
app.default-data-source-type=${APP_DEFAULT_DATA_SOURCE_TYPE:MARKETPLACE_ORDER}

# Local storage cho file upload khi test MVP. Khi deploy nên đổi sang S3/Cloud Storage.
app.storage.local-dir=${APP_STORAGE_DIR:./storage/uploads}

# AI chỉ gọi ở bước suggest mapping. Mặc định tắt để test local không tốn tiền.
app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.base-url=${APP_AI_BASE_URL:https://api.openai.com/v1}
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.model=${APP_AI_MODEL:gpt-4.1-mini}

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
spring.jpa.open-in-view=false
server.forward-headers-strategy=framework