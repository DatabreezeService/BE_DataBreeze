<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>DataBreeze - Xac thuc email</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2a37;
        }

        .container {
            max-width: 560px;
            margin: 32px auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e7eb;
        }

        .otp {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #0f766e;
        }

        .muted {
            color: #6b7280;
            font-size: 13px;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Chao <span th:text="${fullName}">ban</span>,</h2>
        <p>Cam on ban da dang ky DataBreeze. Vui long nhap ma OTP ben duoi de xac thuc email.</p>
        <div class="otp" th:text="${otp}">123456</div>
        <p class="muted">Ma OTP het han luc: <span th:text="${expiresAtText}">--</span></p>
        <p>Neu ban khong yeu cau, vui long bo qua email nay.</p>
        <div class="footer">DataBreeze - Profit Intelligence cho SMEs Viet Nam</div>
    </div>
</body>

</html>
