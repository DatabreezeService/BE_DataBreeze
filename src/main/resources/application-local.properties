# Profile local: dùng PostgreSQL trên localhost để test core ETL bằng Swagger.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/databreeze_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&connectTimeout=30000&socketTimeout=30000&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Local nên để update để tự sinh bảng từ entity trong giai đoạn MVP.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Test thị trường Việt Nam / Shopee VN.
app.market.country=${APP_MARKET_COUNTRY:VN}
app.market.locale=${APP_MARKET_LOCALE:vi-VN}
app.market.currency=${APP_MARKET_CURRENCY:VND}
app.market.timezone=${APP_TIMEZONE:Asia/Ho_Chi_Minh}
app.default-platform=${APP_DEFAULT_PLATFORM:SHOPEE}
app.default-data-source-type=${APP_DEFAULT_DATA_SOURCE_TYPE:MARKETPLACE_ORDER}
app.ai.enabled=${APP_AI_ENABLED:false}

# Local test: owner có thể invite member trong organization workspace qua Swagger.

app.invitation.expire-days=${APP_INVITATION_EXPIRE_DAYS:7}
APP_AI_ENABLED=true
APP_AI_BASE_URL=https://api.openai.com/v1
APP_AI_API_KEY=sk-proj-
APP_AI_MODEL=gpt-4.1-mini