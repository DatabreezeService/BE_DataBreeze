# Profile production: ưu tiên PostgreSQL khi deploy.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/databreeze_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# JWT auth
app.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-minutes=${APP_JWT_EXP_MINUTES:120}

# OTP email verification
app.otp.length=${APP_OTP_LENGTH:6}
app.otp.ttl-minutes=${APP_OTP_TTL_MINUTES:15}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:vieyoungboy@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
app.mail.from=${MAIL_FROM:vieyoungboy@gmail.com}

# Production vẫn mặc định tập trung thị trường Việt Nam.
app.market.country=${APP_MARKET_COUNTRY:VN}
app.market.locale=${APP_MARKET_LOCALE:vi-VN}
app.market.currency=${APP_MARKET_CURRENCY:VND}
app.market.timezone=${APP_TIMEZONE:Asia/Ho_Chi_Minh}
app.default-platform=${APP_DEFAULT_PLATFORM:SHOPEE}
app.default-data-source-type=${APP_DEFAULT_DATA_SOURCE_TYPE:MARKETPLACE_ORDER}

# Bật AI khi deploy nếu đã có key. Không gửi toàn bộ file; chỉ gửi header + vài dòng mẫu.
app.ai.enabled=${APP_AI_ENABLED:true}
app.ai.base-url=${APP_AI_BASE_URL:https://api.openai.com/v1}
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.model=${APP_AI_MODEL:gpt-4.1-mini}

# PayOS
app.payos.client-id=${APP_PAYOS_CLIENT_ID:}
app.payos.api-key=${APP_PAYOS_API_KEY:}
app.payos.checksum-key=${APP_PAYOS_CHECKSUM_KEY:}

# Public FE CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
server.forward-headers-strategy=framework

 
